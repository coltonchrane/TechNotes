name: Contribution Bot
on:
  issues:
    types: [labeled]

jobs:
  create-note:
    if: github.event.label.name == 'contribution'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip uninstall -y google-generativeai || true
          pip install google-genai

      - name: Generate Note with Gemini
        id: generate_note
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          chmod +x scripts/gemini_note_generator.py
          python scripts/gemini_note_generator.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: (Gemini Generated) ${{ github.event.issue.title }}"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: contribution/issue-${{ github.event.issue.number }}
          delete-branch: true
          title: "docs: (Gemini Generated) ${{ github.event.issue.title }}"
          body: |
            ## Automated Note Generation
            This PR was automatically generated by Gemini AI from Issue #${{ github.event.issue.number }}.
            
            Please review the generated markdown note for accuracy and formatting before merging.
            
            Closes #${{ github.event.issue.number }}
          labels: |
            documentation
            automated pr

      - name: Comment on Issue
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "I've created a pull request with the Gemini-generated note! 🎉 Please review it here: $PR_URL"
