name: PR Fixer
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  fix-pr:
    # Trigger if it's a comment on a PR, or a review comment, or a submitted review
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Set Environment Variables
        run: |
          echo "Event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
            echo "COMMENT_BODY=${{ github.event.comment.body }}" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "COMMENT_BODY=${{ github.event.comment.body }}" >> $GITHUB_ENV
            echo "TARGET_FILE=${{ github.event.comment.path }}" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "pull_request_review" ]; then
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "COMMENT_BODY=${{ github.event.review.body }}" >> $GITHUB_ENV
            # Reactions on reviews are different, we'll skip reaction for now or target the review
            echo "REACTION_PATH=/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews/${{ github.event.review.id }}/reactions" >> $GITHUB_ENV
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout ${{ env.PR_NUMBER }}

      - name: Get PR Info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Target File before check: $TARGET_FILE"
          if [ -z "$TARGET_FILE" ]; then
            # If no target file (issue comment or review summary), find the first .md file that was changed in this PR
            PR_DATA=$(gh pr view ${{ env.PR_NUMBER }} --json files)
            MD_FILE=$(echo "$PR_DATA" | jq -r '.files[] | select(.path | endswith(".md")) | .path' | head -n 1)

            # Sanitize MD_FILE before using it in GITHUB_ENV to prevent environment injection
            MD_FILE_CLEAN=$(printf '%s' "$MD_FILE" | tr -d '\n')
            # Optionally trim leading/trailing whitespace
            MD_FILE_CLEAN="${MD_FILE_CLEAN#"${MD_FILE_CLEAN%%[![:space:]]*}"}"
            MD_FILE_CLEAN="${MD_FILE_CLEAN%"${MD_FILE_CLEAN##*[![:space:]]}"}"
            
            if [ -z "$MD_FILE_CLEAN" ]; then
              echo "No markdown file found in this PR."
              exit 0 # Exit gracefully if no MD file to update
            fi
            echo "TARGET_FILE=$MD_FILE_CLEAN" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install google-genai

      - name: Update Note with Gemini
        id: update_note
        if: env.COMMENT_BODY != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          FILE_PATH: ${{ env.TARGET_FILE }}
          COMMENT_BODY: ${{ env.COMMENT_BODY }}
        run: |
          chmod +x scripts/gemini_pr_fixer.py
          python scripts/gemini_pr_fixer.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: (Gemini Refinement) update based on PR comment"
          git push

      - name: React to Comment
        if: env.REACTION_PATH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ env.REACTION_PATH }} \
            -f "content=rocket" || echo "Could not add reaction"
