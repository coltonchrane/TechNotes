name: PR Fixer
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  fix-pr:
    # Trigger if it's a comment on a PR, or a review comment, or a submitted review
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_review_comment' ||
      github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Set Environment Variables
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY_INPUT: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR_NUMBER_INPUT: ${{ github.event.pull_request.number }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_ID: ${{ github.event.review.id }}
          COMMENT_PATH: ${{ github.event.comment.path }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "Event: $EVENT_NAME"
          if [ "$EVENT_NAME" == "issue_comment" ]; then
            echo "PR_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV
            echo "COMMENT_BODY<<EOF" >> $GITHUB_ENV
            echo "$COMMENT_BODY_INPUT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/$REPOSITORY/issues/comments/$COMMENT_ID/reactions" >> $GITHUB_ENV
          elif [ "$EVENT_NAME" == "pull_request_review_comment" ]; then
            echo "PR_NUMBER=$PR_NUMBER_INPUT" >> $GITHUB_ENV
            echo "COMMENT_BODY<<EOF" >> $GITHUB_ENV
            echo "$COMMENT_BODY_INPUT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "TARGET_FILE=$COMMENT_PATH" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/$REPOSITORY/pulls/comments/$COMMENT_ID/reactions" >> $GITHUB_ENV
          elif [ "$EVENT_NAME" == "pull_request_review" ]; then
            echo "PR_NUMBER=$PR_NUMBER_INPUT" >> $GITHUB_ENV
            echo "COMMENT_BODY<<EOF" >> $GITHUB_ENV
            echo "$REVIEW_BODY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            # Reactions on reviews are different, we'll skip reaction for now or target the review
            echo "REACTION_PATH=/repos/$REPOSITORY/pulls/$PR_NUMBER_INPUT/reviews/$REVIEW_ID/reactions" >> $GITHUB_ENV
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER_ENV: ${{ env.PR_NUMBER }}
        run: |
          gh pr checkout "$PR_NUMBER_ENV"

      - name: Get PR Info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_FILE_ENV: ${{ env.TARGET_FILE }}
          PR_NUMBER_ENV: ${{ env.PR_NUMBER }}
        run: |
          echo "Target File before check: $TARGET_FILE_ENV"
          if [ -z "$TARGET_FILE_ENV" ]; then
            # If no target file (issue comment or review summary), find the first .md file that was changed in this PR
            PR_DATA=$(gh pr view $PR_NUMBER_ENV --json files)
            MD_FILE=$(echo $PR_DATA | jq -r '.files[] | select(.path | endswith(".md")) | .path' | head -n 1)
            
            if [ -z "$MD_FILE" ] || [ "$MD_FILE" == "null" ]; then
              echo "No markdown file found in this PR."
              exit 0 # Exit gracefully if no MD file to update
            fi
            echo "TARGET_FILE=$MD_FILE" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install google-genai

      - name: Update Note with Gemini
        id: update_note
        if: env.COMMENT_BODY != '' && env.TARGET_FILE != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          FILE_PATH: ${{ env.TARGET_FILE }}
          COMMENT_BODY: ${{ env.COMMENT_BODY }}
        run: |
          chmod +x scripts/gemini_pr_fixer.py
          python scripts/gemini_pr_fixer.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: (Gemini Refinement) update based on PR comment"
          git push

      - name: React to Comment
        if: env.REACTION_PATH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$REACTION_PATH" \
            -f "content=rocket" || echo "Could not add reaction"
