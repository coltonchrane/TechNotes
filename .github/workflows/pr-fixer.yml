name: PR Fixer
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  fix-pr:
    # Trigger only if it's a comment on a PR
    if: (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) || github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Set Environment Variables
        run: |
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            echo "PR_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" >> $GITHUB_ENV
          else
            echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "REACTION_PATH=/repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions" >> $GITHUB_ENV
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr checkout ${{ env.PR_NUMBER }}

      - name: Get PR Info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If it's a review comment, use the path from the event
          if [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            COMMENT_PATH="${{ github.event.comment.path }}"
            echo "TARGET_FILE=$COMMENT_PATH" >> $GITHUB_ENV
          else
            # For issue comments, find the first .md file that was changed in this PR
            PR_DATA=$(gh pr view ${{ env.PR_NUMBER }} --json files)
            MD_FILE=$(echo $PR_DATA | jq -r '.files[] | select(.path | endswith(".md")) | .path' | head -n 1)
            
            if [ -z "$MD_FILE" ]; then
              echo "No markdown file found in this PR."
              exit 1
            fi
            echo "TARGET_FILE=$MD_FILE" >> $GITHUB_ENV
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip uninstall -y google-generativeai || true
          pip install google-genai

      - name: Update Note with Gemini
        id: update_note
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          FILE_PATH: ${{ env.TARGET_FILE }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          chmod +x scripts/gemini_pr_fixer.py
          python scripts/gemini_pr_fixer.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: (Gemini Refinement) update based on PR comment"
          git push

      - name: React to Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ env.REACTION_PATH }} \
            -f "content=rocket"
