site_name: TechNotes
site_url: https://coltonchrane.github.io/TechNotes/
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

# Use the root as the documentation source
docs_dir: .

# Files to exclude from the built site
exclude_docs: |
  .git/*
  .github/*
  scripts/*
  *.py
  *.sh
  *.json
  .gitignore
  mkdocs.yml
  requirements.txt

# Auto-discover the rest based on folder structure
# (MkDocs will use directory names for navigation)
plugins:
  - search
  - awesome-pages
