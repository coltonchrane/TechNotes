site_name: TechNotes
site_url: https://coltonchrane.github.io/TechNotes/
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

# Source files directory
docs_dir: docs

# Files to exclude from the built site
exclude_docs: |
  *.py
  *.sh
  *.json

# Auto-discover the rest based on folder structure
# (MkDocs will use directory names for navigation)
plugins:
  - search
  - awesome-pages
